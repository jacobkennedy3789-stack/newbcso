<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCSO Terminations</title>
<link rel="stylesheet" href="terminations.css">
</head>

<body>

<h1>Terminated Personnel</h1>

<div class="toolbar">

<input
type="text"
id="searchBox"
placeholder="Search by Name or ID"
/>

<select id="filterStatus">
<option value="all">All</option>
<option value="good">Good Standing</option>
<option value="bad">Bad Standing</option>
<option value="blacklisted">Blacklisted</option>
</select>

</div>

<table id="terminationsTable">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Hire Date</th>
<th>Termination Date</th>
<th>Status</th>
</tr>
</thead>

<tbody id="terminationsBody">
</tbody>

</table>

<div id="modalOverlay" class="hidden">

<div id="modal">

<h2 id="modalName"></h2>

<div class="modalRow">
<label>ID</label>
<span id="modalId"></span>
</div>

<div class="modalRow">
<label>Hire Date</label>
<span id="modalHire"></span>
</div>

<div class="modalRow">
<label>Termination Date</label>
<span id="modalTermination"></span>
</div>

<div class="modalRow">
<label>Notes</label>
<textarea id="notesField" placeholder="Enter termination notes..."></textarea>
</div>

<h3>Audit Log</h3>

<div id="auditLog">
</div>

<div class="modalButtons">
<button id="saveNotes">Save Notes</button>
<button id="closeModal">Close</button>
</div>

</div>

</div>

<script src="terminations.js"></script>

</body>
</html>
